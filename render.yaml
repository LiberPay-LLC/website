services:
  - type: web
    name: liberpay-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/
    envVars:
      - key: ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ORIGINS
        value: https://liberpay.co,https://www.liberpay.co,https://liberpay-llc.github.io
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TEAM_EMAIL
        sync: false
