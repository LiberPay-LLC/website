services:
  backend:
    build:
      context: ./backend
      args:
        ENV: development
    container_name: liberpay-backend-local
    env_file:
      - .env
    ports:
      - "10006:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: liberpay-frontend-local
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "10005:80"
    volumes:
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
